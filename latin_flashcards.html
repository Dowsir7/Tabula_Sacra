<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VULGATA — Latin Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff41;
    --green-dim: #00cc33;
    --green-faint: #004d14;
    --green-ghost: #001a07;
    --bg: #000000;
    --latin-h: 120;
    --latin-s: 100%;
    --latin-l: 50%;
    --english-h: 120;
    --english-s: 60%;
    --english-l: 65%;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    overflow: hidden;
    cursor: crosshair;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* Rain canvas */
  #rain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }

  /* Main card area */
  #app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Card */
  #card {
    width: min(600px, 90vw);
    min-height: 280px;
    border: 1px solid var(--green-dim);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 40px;
    box-shadow: 0 0 30px rgba(0,255,65,0.08), inset 0 0 30px rgba(0,255,65,0.03);
    transition: box-shadow 0.3s;
  }

  #card::before, #card::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--green);
    border-style: solid;
  }
  #card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  #card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  #card-label {
    position: absolute;
    top: 10px; left: 16px;
    font-size: 10px;
    letter-spacing: 3px;
    opacity: 0.4;
    text-transform: uppercase;
  }

  #card-word {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 8vw, 4rem);
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.2;
    transition: opacity 0.15s;
  }

  #card-word.latin-word {
    color: hsl(var(--latin-h), var(--latin-s), var(--latin-l));
    text-shadow: 0 0 20px hsl(var(--latin-h), var(--latin-s), var(--latin-l));
  }

  #card-word.english-word {
    color: hsl(var(--english-h), var(--english-s), var(--english-l));
    text-shadow: 0 0 20px hsl(var(--english-h), var(--english-s), var(--english-l));
  }

  #card-sub {
    margin-top: 12px;
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.45;
    text-transform: uppercase;
  }

  #card-form-label {
    position: absolute;
    bottom: 10px; right: 16px;
    font-size: 10px;
    letter-spacing: 2px;
    opacity: 0.35;
  }

  /* Progress */
  #progress {
    margin-top: 20px;
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0.3;
  }

  /* Buttons */
  #buttons {
    margin-top: 32px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--green-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 20px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
  }

  .btn:hover {
    color: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 12px rgba(0,255,65,0.2);
  }

  .btn:active { opacity: 0.6; }

  /* Menu toggle */
  #menu-toggle {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 100;
    background: transparent;
    border: 1px solid var(--green-faint);
    color: var(--green-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    padding: 8px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  #menu-toggle:hover { border-color: var(--green-dim); color: var(--green); }

  /* Menu panel */
  #menu {
    position: fixed;
    top: 0; right: 0;
    width: min(360px, 100vw);
    height: 100vh;
    background: rgba(0,4,0,0.97);
    border-left: 1px solid var(--green-faint);
    z-index: 200;
    overflow-y: auto;
    padding: 24px;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }

  #menu.open { transform: translateX(0); }

  #menu-close {
    position: absolute;
    top: 16px; right: 16px;
    background: transparent;
    border: 1px solid var(--green-faint);
    color: var(--green-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    letter-spacing: 2px;
  }
  #menu-close:hover { border-color: var(--green); color: var(--green); }

  .menu-section {
    margin-bottom: 28px;
  }

  .menu-title {
    font-size: 10px;
    letter-spacing: 4px;
    opacity: 0.4;
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--green-faint);
  }

  /* Sliders */
  .slider-row {
    margin-bottom: 14px;
  }

  .slider-label {
    font-size: 10px;
    letter-spacing: 2px;
    opacity: 0.5;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    height: 1px;
    background: var(--green-faint);
    outline: none;
    border: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    background: transparent;
    border: 1px solid var(--green);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,255,65,0.4);
  }

  /* Font selector */
  .font-select {
    background: transparent;
    border: 1px solid var(--green-faint);
    color: var(--green-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    width: 100%;
    cursor: pointer;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .font-select option { background: #000; }

  /* Toggle buttons */
  .toggle-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .toggle-btn {
    background: transparent;
    border: 1px solid var(--green-faint);
    color: rgba(0,255,65,0.35);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .toggle-btn.active {
    border-color: var(--green-dim);
    color: var(--green);
    box-shadow: 0 0 8px rgba(0,255,65,0.15);
  }

  /* Color preview swatches */
  .color-preview {
    width: 100%;
    height: 24px;
    border: 1px solid var(--green-faint);
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    letter-spacing: 2px;
    transition: all 0.2s;
  }

  /* Flicker animation */
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.7; }
  }

  #card-word { animation: flicker 8s infinite; }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .word-appear { animation: fadein 0.2s ease; }

  /* No words warning */
  #no-words {
    font-size: 12px;
    letter-spacing: 3px;
    opacity: 0.4;
    text-align: center;
    display: none;
  }
</style>
</head>
<body>

<canvas id="rain"></canvas>

<button id="menu-toggle">⌥ OPTIONS</button>

<div id="app">
  <div id="card">
    <div id="card-label">LATIN</div>
    <div id="card-word" class="latin-word">—</div>
    <div id="card-sub"></div>
    <div id="card-form-label"></div>
  </div>
  <div id="no-words">NO WORDS IN SELECTED POOL</div>
  <div id="progress">— / —</div>
  <div id="buttons">
    <button class="btn" id="btn-forms">FORMS</button>
    <button class="btn" id="btn-flip">FLIP</button>
    <button class="btn" id="btn-next">NEXT →</button>
  </div>
</div>

<!-- Menu -->
<div id="menu">
  <button id="menu-close">✕ CLOSE</button>

  <div style="margin-bottom:28px; margin-top: 8px;">
    <div class="menu-title">VULGATA // LATIN DRILL</div>
  </div>

  <div class="menu-section">
    <div class="menu-title">WORD POOL SIZE</div>
    <div class="slider-row">
      <div class="slider-label"><span>MOST COMMON</span><span id="pool-val">25</span></div>
      <input type="range" id="pool-size" min="10" max="100" step="5" value="25">
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-title">WORD TYPES</div>
    <div class="toggle-group" id="type-toggles">
      <button class="toggle-btn active" data-type="all">ALL</button>
      <button class="toggle-btn active" data-type="noun">NOUNS</button>
      <button class="toggle-btn active" data-type="verb">VERBS</button>
      <button class="toggle-btn active" data-type="prep">PREP</button>
      <button class="toggle-btn active" data-type="conj">CONJ</button>
      <button class="toggle-btn active" data-type="adj">ADJ</button>
      <button class="toggle-btn active" data-type="pron">PRON</button>
      <button class="toggle-btn active" data-type="adv">ADV</button>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-title">ORDER</div>
    <div class="toggle-group" id="order-toggles">
      <button class="toggle-btn active" data-order="random">RANDOM</button>
      <button class="toggle-btn" data-order="alpha">A→Z</button>
      <button class="toggle-btn" data-order="alpha-r">Z→A</button>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-title">CARD DIRECTION</div>
    <div class="toggle-group" id="dir-toggles">
      <button class="toggle-btn active" data-dir="latin">LATIN → ENG</button>
      <button class="toggle-btn" data-dir="english">ENG → LATIN</button>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-title">FONT</div>
    <select class="font-select" id="font-select">
      <option value="'Cinzel', serif">Cinzel (Classical)</option>
      <option value="'Share Tech Mono', monospace">Share Tech Mono</option>
      <option value="'Courier New', monospace">Courier New</option>
      <option value="Georgia, serif">Georgia</option>
      <option value="'Times New Roman', serif">Times New Roman</option>
    </select>
    <div class="slider-row">
      <div class="slider-label"><span>SIZE</span><span id="font-size-val">4rem</span></div>
      <input type="range" id="font-size" min="1" max="8" step="0.5" value="4">
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-title">LATIN WORD COLOR (HSL)</div>
    <div class="slider-row">
      <div class="slider-label"><span>HUE</span><span id="lh-val">120</span></div>
      <input type="range" id="latin-h" min="0" max="360" value="120">
    </div>
    <div class="slider-row">
      <div class="slider-label"><span>SATURATION</span><span id="ls-val">100%</span></div>
      <input type="range" id="latin-s" min="0" max="100" value="100">
    </div>
    <div class="slider-row">
      <div class="slider-label"><span>LIGHTNESS</span><span id="ll-val">50%</span></div>
      <input type="range" id="latin-l" min="20" max="90" value="50">
    </div>
    <div class="color-preview" id="latin-preview" style="color: hsl(120,100%,50%); border-color: hsl(120,100%,50%);">DEUS</div>
  </div>

  <div class="menu-section">
    <div class="menu-title">ENGLISH WORD COLOR (HSL)</div>
    <div class="slider-row">
      <div class="slider-label"><span>HUE</span><span id="eh-val">120</span></div>
      <input type="range" id="english-h" min="0" max="360" value="120">
    </div>
    <div class="slider-row">
      <div class="slider-label"><span>SATURATION</span><span id="es-val">60%</span></div>
      <input type="range" id="english-s" min="0" max="100" value="60">
    </div>
    <div class="slider-row">
      <div class="slider-label"><span>LIGHTNESS</span><span id="el-val">65%</span></div>
      <input type="range" id="english-l" min="20" max="90" value="65">
    </div>
    <div class="color-preview" id="english-preview" style="color: hsl(120,60%,65%); border-color: hsl(120,60%,65%);">GOD</div>
  </div>

</div>

<script>

// ── State ──────────────────────────────────────────────────────────────────
let state = {
  poolSize: 25,
  activeTypes: new Set(['noun','verb','prep','conj','adj','pron','adv']),
  order: 'random',
  direction: 'latin',
  fontFamily: "'Cinzel', serif",
  fontSize: 4,
  isFlipped: false,
  formIndex: 0,
  pool: [],
  poolIndex: 0,
  currentWord: null,
};

function buildPool() {
  let filtered = WORDS.filter(w => state.activeTypes.has(w.type));
  filtered.sort((a,b) => a.rank - b.rank);
  filtered = filtered.slice(0, state.poolSize);

  if (state.order === 'random') {
    for (let i = filtered.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [filtered[i],filtered[j]] = [filtered[j],filtered[i]];
    }
  } else if (state.order === 'alpha') {
    filtered.sort((a,b) => a.latin.localeCompare(b.latin));
  } else if (state.order === 'alpha-r') {
    filtered.sort((a,b) => b.latin.localeCompare(a.latin));
  }

  state.pool = filtered;
  state.poolIndex = 0;
  state.currentWord = filtered[0] || null;
  state.isFlipped = false;
  state.formIndex = 0;
  renderCard();
}

function renderCard() {
  const word = state.currentWord;
  const cardWord = document.getElementById('card-word');
  const cardLabel = document.getElementById('card-label');
  const cardSub = document.getElementById('card-sub');
  const cardFormLabel = document.getElementById('card-form-label');
  const progress = document.getElementById('progress');
  const noWords = document.getElementById('no-words');
  const card = document.getElementById('card');

  if (!word) {
    card.style.display = 'none';
    document.getElementById('buttons').style.display = 'none';
    noWords.style.display = 'block';
    progress.textContent = '0 / 0';
    return;
  }

  card.style.display = 'flex';
  document.getElementById('buttons').style.display = 'flex';
  noWords.style.display = 'none';

  // Determine what to show
  const showingLatin = (!state.isFlipped && state.direction === 'latin') ||
                       (state.isFlipped && state.direction === 'english');

  // Indeclinable types don't have forms
  const indeclinable = (word.type === 'prep' || word.type === 'conj' || word.type === 'adv');

  // Clamp formIndex for indeclinables
  if (indeclinable) state.formIndex = 0;

  const displayForm = word.forms[state.formIndex];

  cardWord.className = 'card-word word-appear ' + (showingLatin ? 'latin-word' : 'english-word');

  if (showingLatin) {
    cardWord.textContent = displayForm;
    cardLabel.textContent = word.type.toUpperCase() + ' · LATIN';
    cardSub.textContent = '';
  } else {
    cardWord.textContent = state.formIndex === 0 ? word.english : word.formLabels[state.formIndex];
    cardLabel.textContent = word.type.toUpperCase() + ' · ENGLISH';
    cardSub.textContent = '';
  }

  if (indeclinable) {
    cardFormLabel.textContent = 'INDECLINABLE';
  } else {
    cardFormLabel.textContent = state.formIndex > 0 ? `FORM ${state.formIndex+1}/6` : '';
  }

  progress.textContent = `${state.poolIndex + 1} / ${state.pool.length}`;

  // Trigger animation
  void cardWord.offsetWidth;
  cardWord.classList.add('word-appear');
}

// ── Controls ───────────────────────────────────────────────────────────────
document.getElementById('btn-flip').addEventListener('click', () => {
  state.isFlipped = !state.isFlipped;
  renderCard();
});

document.getElementById('btn-forms').addEventListener('click', () => {
  const w = state.currentWord;
  if (!w) return;
  if (w.type === 'prep' || w.type === 'conj' || w.type === 'adv') return;
  state.formIndex = (state.formIndex + 1) % 6;
  renderCard();
});

document.getElementById('btn-next').addEventListener('click', () => {
  if (!state.pool.length) return;
  state.poolIndex = (state.poolIndex + 1) % state.pool.length;
  state.currentWord = state.pool[state.poolIndex];
  state.isFlipped = false;
  state.formIndex = 0;
  renderCard();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') document.getElementById('btn-next').click();
  if (e.key === 'ArrowUp' || e.key === 'f') document.getElementById('btn-flip').click();
  if (e.key === 'ArrowDown' || e.key === 'd') document.getElementById('btn-forms').click();
});

// ── Menu ───────────────────────────────────────────────────────────────────
document.getElementById('menu-toggle').addEventListener('click', () => {
  document.getElementById('menu').classList.add('open');
});
document.getElementById('menu-close').addEventListener('click', () => {
  document.getElementById('menu').classList.remove('open');
});

// Pool size
document.getElementById('pool-size').addEventListener('input', function() {
  state.poolSize = +this.value;
  document.getElementById('pool-val').textContent = this.value;
  buildPool();
});

// Type toggles
document.getElementById('type-toggles').addEventListener('click', e => {
  const btn = e.target.closest('.toggle-btn');
  if (!btn) return;
  const type = btn.dataset.type;

  if (type === 'all') {
    const allOn = state.activeTypes.size === 7;
    if (allOn) {
      state.activeTypes.clear();
    } else {
      ['noun','verb','prep','conj','adj','pron','adv'].forEach(t => state.activeTypes.add(t));
    }
  } else {
    if (state.activeTypes.has(type)) {
      state.activeTypes.delete(type);
    } else {
      state.activeTypes.add(type);
    }
  }

  // Update buttons
  document.querySelectorAll('#type-toggles .toggle-btn').forEach(b => {
    if (b.dataset.type === 'all') {
      b.classList.toggle('active', state.activeTypes.size === 7);
    } else {
      b.classList.toggle('active', state.activeTypes.has(b.dataset.type));
    }
  });
  buildPool();
});

// Order toggles
document.getElementById('order-toggles').addEventListener('click', e => {
  const btn = e.target.closest('.toggle-btn');
  if (!btn) return;
  state.order = btn.dataset.order;
  document.querySelectorAll('#order-toggles .toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.order === state.order);
  });
  buildPool();
});

// Direction toggles
document.getElementById('dir-toggles').addEventListener('click', e => {
  const btn = e.target.closest('.toggle-btn');
  if (!btn) return;
  state.direction = btn.dataset.dir;
  document.querySelectorAll('#dir-toggles .toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.dir === state.direction);
  });
  state.isFlipped = false;
  renderCard();
});

// Font
document.getElementById('font-select').addEventListener('change', function() {
  state.fontFamily = this.value;
  document.getElementById('card-word').style.fontFamily = state.fontFamily;
});

document.getElementById('font-size').addEventListener('input', function() {
  state.fontSize = +this.value;
  document.getElementById('font-size-val').textContent = this.value + 'rem';
  document.getElementById('card-word').style.fontSize = this.value + 'rem';
});

// Color sliders
function updateColors() {
  const lh = document.getElementById('latin-h').value;
  const ls = document.getElementById('latin-s').value;
  const ll = document.getElementById('latin-l').value;
  const eh = document.getElementById('english-h').value;
  const es = document.getElementById('english-s').value;
  const el = document.getElementById('english-l').value;

  document.getElementById('lh-val').textContent = lh;
  document.getElementById('ls-val').textContent = ls + '%';
  document.getElementById('ll-val').textContent = ll + '%';
  document.getElementById('eh-val').textContent = eh;
  document.getElementById('es-val').textContent = es + '%';
  document.getElementById('el-val').textContent = el + '%';

  const latinColor = `hsl(${lh},${ls}%,${ll}%)`;
  const engColor = `hsl(${eh},${es}%,${el}%)`;

  document.documentElement.style.setProperty('--latin-h', lh);
  document.documentElement.style.setProperty('--latin-s', ls + '%');
  document.documentElement.style.setProperty('--latin-l', ll + '%');
  document.documentElement.style.setProperty('--english-h', eh);
  document.documentElement.style.setProperty('--english-s', es + '%');
  document.documentElement.style.setProperty('--english-l', el + '%');

  const lPrev = document.getElementById('latin-preview');
  lPrev.style.color = latinColor;
  lPrev.style.borderColor = latinColor;

  const ePrev = document.getElementById('english-preview');
  ePrev.style.color = engColor;
  ePrev.style.borderColor = engColor;

  renderCard();
}

['latin-h','latin-s','latin-l','english-h','english-s','english-l'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateColors);
});

// ── Matrix rain ────────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('rain');
  const ctx = canvas.getContext('2d');
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let cols, drops;

  function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.floor(canvas.width / 18);
    drops = Array(cols).fill(1);
  }

  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = '13px Share Tech Mono';
    for (let i=0; i<drops.length; i++) {
      const ch = chars[Math.floor(Math.random()*chars.length)];
      ctx.fillText(ch, i*18, drops[i]*18);
      if (drops[i]*18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }

  init();
  window.addEventListener('resize', init);
  setInterval(draw, 50);
})();

// ── Init ───────────────────────────────────────────────────────────────────
buildPool();
